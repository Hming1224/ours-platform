<title>Ours — 台灣公共社群平台</title>
<style>
  :root{--ink:#1f2328;--muted:#6b7280;--faint:#9aa1a9;--bg:#f4f5f7;--surface:#fff;--soft:#e6e9ed;--reco:#2f8f5b;--shadow:0 4px 16px rgba(20,24,30,.06)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;padding:56px 24px}
  .wrap{max-width:640px;margin:0 auto}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--reco);text-transform:uppercase;margin-bottom:10px}
  h1{font-size:30px;letter-spacing:-.5px;margin-bottom:8px}
  .lead{color:var(--muted);font-size:15px;margin-bottom:14px}
  .meta{color:var(--faint);font-size:13px;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--soft)}
  .meta b{color:var(--muted)}
  .sec-label{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:14px}
  a.item{display:block;background:var(--surface);border:1px solid var(--soft);border-radius:16px;padding:20px 22px;margin-bottom:14px;text-decoration:none;color:inherit;box-shadow:var(--shadow);transition:.15s}
  a.item:hover{border-color:var(--ink);transform:translateY(-1px)}
  .item .top{display:flex;align-items:center;gap:10px;margin-bottom:5px}
  .item h2{font-size:17px}
  .date{font-size:12px;color:var(--faint);margin-left:auto;white-space:nowrap}
  .tag{font-size:11px;font-weight:700;color:var(--reco);background:#e8f4ed;padding:2px 9px;border-radius:20px}
  .item p{color:var(--muted);font-size:13.5px}
  footer{color:var(--faint);font-size:12px;margin-top:30px;text-align:center}
</style>
</head>
<body>
