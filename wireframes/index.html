<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ours 議題頁提案</title>
<style>
  :root{--ink:#1f2328;--muted:#6b7280;--bg:#f4f5f7;--surface:#fff;--soft:#e6e9ed;--reco:#2f8f5b;--shadow:0 4px 16px rgba(20,24,30,.06)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
  .card{max-width:560px;width:100%}
  h1{font-size:28px;letter-spacing:-.4px;margin-bottom:6px}
  .lead{color:var(--muted);font-size:15px;margin-bottom:28px}
  a.item{display:block;background:var(--surface);border:1px solid var(--soft);border-radius:16px;padding:20px 22px;margin-bottom:14px;text-decoration:none;color:inherit;box-shadow:var(--shadow);transition:.15s}
  a.item:hover{border-color:var(--ink);transform:translateY(-1px)}
  .item h2{font-size:17px;margin-bottom:4px;display:flex;align-items:center;gap:9px}
  .tag{font-size:11px;font-weight:700;color:var(--reco);background:#e8f4ed;padding:2px 9px;border-radius:20px}
  .item p{color:var(--muted);font-size:13.5px}
  footer{color:#9aa1a9;font-size:12px;margin-top:18px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <h1>Ours 議題頁提案</h1>
  <p class="lead">手機 App · 低擬真 wireframe · 先共識 → 後分歧</p>

  <a class="item" href="議題頁-提案配置器.html">
    <h2>互動配置器 <span class="tag">推薦</span></h2>
    <p>探索頁 / 議題頁的每個元件都能即時切換，左邊手機馬上組出效果。</p>
  </a>

  <a class="item" href="議題頁-提案.html">
    <h2>靜態全覽</h2>
    <p>一頁捲到底看完所有版型變體、優缺點與推薦組合表，適合截圖分享。</p>
  </a>

  <footer>低擬真 wireframe · 無配色／高擬真／最終樣式</footer>
</div>
</body>
</html>
